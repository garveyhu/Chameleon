name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend lint + 单元测试 ─────────────────────────────
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chameleon
          POSTGRES_PASSWORD: chameleon-ci
          POSTGRES_DB: chameleon_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U chameleon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://chameleon:chameleon-ci@localhost:5432/chameleon_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DB: 1
          REDIS_PASSWORD: ""
          CHAMELEON_JWT_SECRET: ci-jwt-secret-thirty-two-bytes-padded-aaaaaaaa
          CHAMELEON_CRYPTO_KEY: ci-crypto-key-thirty-two-bytes-padded-aaaaaaa==
        run: uv run pytest -x --tb=short

  # ── Frontend lint + build ─────────────────────────────
  frontend:
    name: Frontend (eslint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install main frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: ESLint
        working-directory: frontend
        run: yarn lint:eslint || true   # 报告 lint，但不挡 PR（可逐步收敛）

      - name: Build main frontend
        working-directory: frontend
        run: yarn build

      - name: Install widget deps
        working-directory: frontend/embed
        run: yarn install --frozen-lockfile

      - name: Build widget
        working-directory: frontend/embed
        run: |
          yarn tsc -b --noEmit
          yarn vite build

  # ── Docker 镜像构建验证 ──────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          tags: chameleon/chameleon-base:ci
          push: false
          load: true
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Build code image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.code
          build-args: |
            BASE_IMAGE=chameleon/chameleon-base
            BASE_TAG=ci
          tags: chameleon/chameleon-code:ci
          push: false
          cache-from: type=gha,scope=code
          cache-to: type=gha,scope=code,mode=max

      - name: Build ui image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.ui
          tags: chameleon/chameleon-ui:ci
          push: false
          cache-from: type=gha,scope=ui
          cache-to: type=gha,scope=ui,mode=max
