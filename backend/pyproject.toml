# Chameleon backend workspace 根 —— virtual workspace（root 本身非 project）
# 包结构（清晰分层）：
#   chameleon-core/                    基础设施 + AI infra + 共享 ORM
#   chameleon-providers/base/          Provider 协议（types / registry）
#   chameleon-providers/local/         本地 in-process provider（BaseAgent 子类）
#   chameleon-providers/dify/          远程 SaaS provider
#   chameleon-providers/fastgpt/       远程 SaaS provider
#   chameleon-agents/<key>/            业务级本地 agent
#   chameleon-agents/examples/<key>/   示例 / 范式样板 agent
#   chameleon-api/                     对外 AI 服务能力（agent / knowledge / conversation / task）
#   chameleon-system/                  内部管理接口（api_key / admin / 未来 dashboard）
#   chameleon-app/                     FastAPI 启动器（薄，仅装配 + lifespan + 中间件）

[tool.uv.workspace]
members = [
    "chameleon-core",
    "chameleon-data",
    "chameleon-integrations",
    "chameleon-engine",
    "chameleon-providers/*",
    "chameleon-agentkit",
    "chameleon-agents/*",
    "chameleon-agents/examples/*",
    "chameleon-api",
    "chameleon-system",
    "chameleon-app",
]
# examples 目录本身不是包（无 pyproject.toml），用 exclude 防止 glob 把它当成 member
exclude = ["chameleon-agents/examples"]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "respx>=0.21",
    "pytest-httpserver>=1",
    "import-linter>=2.1",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
extend-select = ["I"]  # isort

[tool.ruff.lint.isort]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]
known-first-party = ["chameleon"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "session"
asyncio_default_fixture_loop_scope = "session"
# importlib 模式：允许跨子包同名 test 文件（不需要 __init__.py）
addopts = "--import-mode=importlib"
# 不设 testpaths——默认从 rootdir 递归发现，覆盖各子包 tests/
# 跨包集成测试放 workspace 根的 tests/

# ── import-linter：core 分层架构护栏（见 docs/plans/2026-05-29-core-layering-refactor.md）──
# R5：两条契约均 GREEN，作为分层守门。无 CI——本地 / pre-commit 跑：uv run lint-imports
[tool.importlinter]
root_packages = [
    "chameleon.core",
    "chameleon.data",
    "chameleon.integrations",
    "chameleon.engine",
]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "core 保持纯抽象：禁 sqlalchemy / langchain 系"
type = "forbidden"
source_modules = ["chameleon.core"]
forbidden_modules = [
    "sqlalchemy",
    "langchain",
    "langchain_core",
    "langchain_openai",
    "langgraph",
]
# core 零 ignore：所有实现/便利 facade 已迁出 core 或删除，core 不 import 任何 integrations。

[[tool.importlinter.contracts]]
name = "分层基座单向：core ← data ← integrations ← engine（禁反向 / 越层）"
type = "layers"
layers = [
    "chameleon.engine",
    "chameleon.integrations",
    "chameleon.data",
    "chameleon.core",
]
# 零 ignore_imports：core 已是纯协议薄壳，对 integrations 零反向依赖。

