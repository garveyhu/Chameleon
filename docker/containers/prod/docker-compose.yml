# ─────────────────────────────────────────────────────────────
# Chameleon 生产环境 compose（image-only，无 build 块）
#
# 运维使用：
#   1. 这份 compose 文件 + 同目录 .env（含镜像 tag + DB/Redis/JWT 密钥）
#   2. docker login {registry}
#   3. docker compose pull && docker compose up -d
#
# 跟 dev compose 的差异：
#   - 不含 build profiles
#   - 不挂载 backend 源码 config/（生产应该把业务 seed 也归 DB）
#   - 默认走 internal-only PG（不暴露 5432）
# ─────────────────────────────────────────────────────────────

name: chameleon

services:
  chameleon-pg:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?}
      TZ: ${TZ:-UTC}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chameleon-net

  chameleon-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chameleon-net

  chameleon-backend:
    image: ${REGISTRY_PREFIX}/chameleon-code:${CHAMELEON_CODE_TAG:?}
    restart: always
    depends_on:
      chameleon-pg:
        condition: service_healthy
      chameleon-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${PG_USER}:${PG_PASSWORD}@chameleon-pg:5432/${PG_DB}
      REDIS_HOST: chameleon-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHAMELEON_JWT_SECRET: ${CHAMELEON_JWT_SECRET:?}
      CHAMELEON_CRYPTO_KEY: ${CHAMELEON_CRYPTO_KEY:?}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CHAMELEON_INSTANCE_ID: ${CHAMELEON_INSTANCE_ID:-0}
      CHAMELEON_PORT: 7009
      CHAMELEON_WORKERS: ${CHAMELEON_WORKERS:-4}
      CHAMELEON_LOG_LEVEL: ${CHAMELEON_LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
    volumes:
      - backend-resources:/app/resources
      - backend-logs:/app/logs
    networks:
      - chameleon-net

  chameleon-ui:
    image: ${REGISTRY_PREFIX}/chameleon-ui:${CHAMELEON_UI_TAG:?}
    restart: always
    depends_on:
      chameleon-backend:
        condition: service_healthy
    ports:
      - "${UI_HOST_PORT:-80}:80"
    networks:
      - chameleon-net

volumes:
  pg-data:
  redis-data:
  backend-resources:
  backend-logs:

networks:
  chameleon-net:
    driver: bridge
