# ─────────────────────────────────────────────────────────────
# Chameleon 本地开发 + 全量自部署 compose
#
# 5 个服务：
#   chameleon-pg       PostgreSQL 16 + pgvector
#   chameleon-redis    Redis 7（密码可关）
#   chameleon-backend  FastAPI 应用（auto-migrate）
#   chameleon-ui       Nginx serve frontend + reverse proxy /v1
#
# 配置策略（混合）：
#   - 连接信息 / 密钥 / 端口 / 日志级别 → 走 environment（运维改 .env 即可）
#   - 业务 seed (config/model.json / agents.yaml / chameleon.json) → bind mount /app/config
#   - 业务运行时（Provider/Agent/User…） → DB（admin UI 实时改）
#
# 运维步骤：
#   1. cp ../images/.env.example ../images/.env  # 镜像 tag
#   2. cp .env.example .env                       # 运行时配置（DB 密码 / JWT secret 等）
#   3. ./docker/scripts/run-local.sh
# ─────────────────────────────────────────────────────────────

name: chameleon

services:
  # ── PostgreSQL + pgvector ───────────────────────────────
  chameleon-pg:
    image: pgvector/pgvector:pg16
    container_name: chameleon-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-chameleon}
      POSTGRES_USER: ${PG_USER:-chameleon}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD 未设置}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-chameleon} -d ${PG_DB:-chameleon}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chameleon-net

  # ── Redis ───────────────────────────────────────────────
  chameleon-redis:
    image: redis:7-alpine
    container_name: chameleon-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD 未设置}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chameleon-net

  # ── Backend ─────────────────────────────────────────────
  chameleon-backend:
    image: ${REGISTRY_PREFIX:-chameleon}/chameleon-code:${CHAMELEON_CODE_TAG:-latest}
    container_name: chameleon-backend
    restart: unless-stopped
    depends_on:
      chameleon-pg:
        condition: service_healthy
      chameleon-redis:
        condition: service_healthy
    environment:
      # 数据库 / Redis 连接（高优先级，覆盖 component.json）
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-chameleon}:${PG_PASSWORD}@chameleon-pg:5432/${PG_DB:-chameleon}
      REDIS_HOST: chameleon-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # 安全密钥
      CHAMELEON_JWT_SECRET: ${CHAMELEON_JWT_SECRET:?CHAMELEON_JWT_SECRET 未设置}
      CHAMELEON_CRYPTO_KEY: ${CHAMELEON_CRYPTO_KEY:?CHAMELEON_CRYPTO_KEY 未设置}

      # 应用配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CHAMELEON_INSTANCE_ID: ${CHAMELEON_INSTANCE_ID:-0}
      CHAMELEON_PORT: 7009
      CHAMELEON_WORKERS: ${CHAMELEON_WORKERS:-2}
      CHAMELEON_LOG_LEVEL: ${CHAMELEON_LOG_LEVEL:-info}

      TZ: ${TZ:-UTC}
    volumes:
      # 业务 seed：首次启动会从这里读 model.json / agents.yaml 灌 DB
      - ../../backend/config:/app/config:ro
      # 知识库 embedding 模型 / 上传素材
      - ./data/resources:/app/resources
      # 容器日志（含 initial-admin-credentials.txt）
      - ./data/logs:/app/logs
    ports:
      - "${BACKEND_HOST_PORT:-7009}:7009"
    networks:
      - chameleon-net

  # ── Frontend nginx ──────────────────────────────────────
  chameleon-ui:
    image: ${REGISTRY_PREFIX:-chameleon}/chameleon-ui:${CHAMELEON_UI_TAG:-latest}
    container_name: chameleon-ui
    restart: unless-stopped
    depends_on:
      chameleon-backend:
        condition: service_healthy
    ports:
      - "${UI_HOST_PORT:-6006}:80"
    networks:
      - chameleon-net

  # ── build profiles（本地 dev 用） ───────────────────────
  chameleon-base-build:
    profiles: ["build"]
    image: chameleon/chameleon-base:${CHAMELEON_BASE_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.base

  chameleon-code-build:
    profiles: ["build"]
    image: chameleon/chameleon-code:${CHAMELEON_CODE_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.code
      args:
        BASE_IMAGE: chameleon/chameleon-base
        BASE_TAG: ${CHAMELEON_BASE_TAG:-latest}

  chameleon-ui-build:
    profiles: ["build"]
    image: chameleon/chameleon-ui:${CHAMELEON_UI_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.ui

networks:
  chameleon-net:
    driver: bridge
