# ─────────────────────────────────────────────────────────────
# Chameleon 本地开发 + 全栈自部署 compose
#
# 镜像拆分（参考 sage 4 镜像模式）：
#   chameleon-base  python + uv + os deps + entrypoint（主容器跑它）
#   chameleon-venv  data-only：仅 .venv 目录（依赖变更才换）
#   chameleon-code  data-only：源码 + migrations（每次代码改）
#   chameleon-ui    nginx + frontend dist + widget.js
#
# init 容器：
#   venv-init   cp /export/.venv → venv-data volume → 挂到 /app/.venv
#   code-init   cp /export/      → code-data volume → 挂到 /app
#
# dev 场景：init 容器**不带 .version skip**，每次 up 都重 cp，避免改代码不生效。
# 生产 prod compose 保留 .version skip，避免每次 restart 重 cp 大文件。
#
# 服务清单：
#   chameleon-pg / chameleon-redis / venv-init / code-init / chameleon-backend / chameleon-ui
# ─────────────────────────────────────────────────────────────

name: chameleon

services:
  # ── PostgreSQL + pgvector ───────────────────────────────
  chameleon-pg:
    image: pgvector/pgvector:pg16
    container_name: chameleon-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-chameleon}
      POSTGRES_USER: ${PG_USER:-chameleon}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD 未设置}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-chameleon} -d ${PG_DB:-chameleon}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chameleon-net

  # ── Redis ───────────────────────────────────────────────
  chameleon-redis:
    image: redis:7-alpine
    container_name: chameleon-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD 未设置}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - chameleon-net

  # ── init 容器：venv ─────────────────────────────────────
  # dev 场景：每次都重 cp（不带 .version skip），保证依赖更新立即生效。
  # 生产场景：带 .version skip，避免每次重 cp 几百 MB venv。
  venv-init:
    image: chameleon/chameleon-venv:${CHAMELEON_VENV_TAG:-latest}
    container_name: chameleon-venv-init
    restart: "no"
    volumes:
      - venv-data:/target
    command: >
      sh -c '
        rm -rf /target/* /target/.[!.]* 2>/dev/null || true;
        cp -a /export/.venv/. /target/;
        echo "venv synced";
      '

  # ── init 容器：code ─────────────────────────────────────
  code-init:
    image: chameleon/chameleon-code:${CHAMELEON_CODE_TAG:-latest}
    container_name: chameleon-code-init
    restart: "no"
    volumes:
      - code-data:/target
    command: >
      sh -c '
        rm -rf /target/* /target/.[!.]* 2>/dev/null || true;
        cp -a /export/. /target/;
        echo "code synced";
      '

  # ── 主后端容器（跑 base 镜像 + 挂 venv/code volume） ───
  chameleon-backend:
    image: chameleon/chameleon-base:${CHAMELEON_BASE_TAG:-latest}
    container_name: chameleon-backend
    restart: unless-stopped
    depends_on:
      chameleon-pg:
        condition: service_healthy
      chameleon-redis:
        condition: service_healthy
      venv-init:
        condition: service_completed_successfully
      code-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-chameleon}:${PG_PASSWORD}@chameleon-pg:5432/${PG_DB:-chameleon}
      REDIS_HOST: chameleon-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHAMELEON_JWT_SECRET: ${CHAMELEON_JWT_SECRET:?CHAMELEON_JWT_SECRET 未设置}
      CHAMELEON_CRYPTO_KEY: ${CHAMELEON_CRYPTO_KEY:?CHAMELEON_CRYPTO_KEY 未设置}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CHAMELEON_INSTANCE_ID: ${CHAMELEON_INSTANCE_ID:-0}
      CHAMELEON_PORT: 7009
      CHAMELEON_WORKERS: ${CHAMELEON_WORKERS:-2}
      CHAMELEON_LOG_LEVEL: ${CHAMELEON_LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
    volumes:
      # 镜像挂载顺序：浅 → 深（Docker 支持嵌套挂载）
      - code-data:/app
      - venv-data:/app/.venv
      # 业务 seed（首启灌 DB 用；运行时若想热改也行）
      - ../../backend/config:/app/config:ro
      # 知识库 embedding / 上传素材
      - ./data/resources:/app/resources
      # 容器日志（含 initial-admin-credentials.txt）
      - ./data/logs:/app/logs
    ports:
      - "${BACKEND_HOST_PORT:-7009}:7009"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7009/docs"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    networks:
      - chameleon-net

  # ── Frontend nginx ──────────────────────────────────────
  chameleon-ui:
    image: chameleon/chameleon-ui:${CHAMELEON_UI_TAG:-latest}
    container_name: chameleon-ui
    restart: unless-stopped
    depends_on:
      chameleon-backend:
        condition: service_healthy
    ports:
      - "${UI_HOST_PORT:-6006}:80"
    networks:
      - chameleon-net

  # ── build profiles（本地 dev 用，docker compose build chameleon-*-build） ──
  chameleon-base-build:
    profiles: ["build"]
    image: chameleon/chameleon-base:${CHAMELEON_BASE_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.base

  chameleon-venv-build:
    profiles: ["build"]
    image: chameleon/chameleon-venv:${CHAMELEON_VENV_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.venv
      args:
        BASE_IMAGE: chameleon/chameleon-base
        BASE_TAG: ${CHAMELEON_BASE_TAG:-latest}

  chameleon-code-build:
    profiles: ["build"]
    image: chameleon/chameleon-code:${CHAMELEON_CODE_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.code

  chameleon-ui-build:
    profiles: ["build"]
    image: chameleon/chameleon-ui:${CHAMELEON_UI_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/images/Dockerfile.ui

volumes:
  venv-data:
  code-data:

networks:
  chameleon-net:
    driver: bridge
