# nginx config —— chameleon-ui
#
# 作用：
#   1. serve 主 frontend SPA（/）
#   2. reverse proxy /v1/* → chameleon-backend:7009
#   3. SSE / WebSocket 友好（不 buffer / 不 cache / 长超时）

upstream chameleon_backend {
    server chameleon-backend:7009;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 健康探针
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 静态资源 —— 主 frontend dist
    root /usr/share/nginx/html;
    index index.html;

    # widget bundle 给业务方网页用 —— 开放 CORS
    location = /widget.js {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # 静态资源缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理
    location /v1/ {
        proxy_pass http://chameleon_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;

        # SSE / 长响应 —— 不 buffer 不 cache
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;

        # WebSocket 支持（备用）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
